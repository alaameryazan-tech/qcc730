# mqtt demo setting
CONFIG_QCCSDK_DEMO=y
CONFIG_WLAN_QAPI=y
CONFIG_MQTT_CLIENT=y
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y
CONFIG_POSIX_FS_API=y
CONFIG_FW_UPGRADE=y

# Transport layer mode of MQTT, Choose one of the following three modes
CONFIG_MQTT_PLAINTEXT_DEMO=y
CONFIG_MQTT_BASIC_TLS_DEMO=n
CONFIG_MQTT_MUTUAL_AUTH_DEMO=n
# end of mqtt demo setting
