# This is configuration for Qualcomm QCC730 chip

################################################
#
# interface configuration
#
################################################

adapter driver ch347
ch347 vid_pid 0x1a86 0x55dd

adapter speed 8000

transport select jtag
################################################


set CHIPNAME QCC730
set TAPTYPE cpu
#CPUTAPID is matched to OTP JTAGID
#CPUTAPID 0x0021b0e1:fermion-1. 0x0029e0e1:fermion-2-V&M. 0x0029f0e1:fermion-2-IoT
set CPUTAPID 0x0029f0e1
set IRLEN 7

#
# Qualcomm QCC730 target device
#

if { [info exists TAPTYPE] } {
    set _TAPTYPE $TAPTYPE
} else {
    set _TAPTYPE cpu
}

if { [info exists CHIPNAME] } {
    set _CHIPNAME $CHIPNAME
} else {
    set _CHIPNAME QCC730
}

if { [info exists CPUTAPID] } {
    set _CPUTAPID $CPUTAPID
} else {
    set _CPUTAPID 0x0029e0e1
}

if { [info exists IRLEN] } {
    set _IRLEN $IRLEN
} else {
    set _IRLEN 7
}

set _ENDIAN little

 #reset the QCC TAP
jtag_ntrst_delay 100
reset_config trst_only trst_open_drain

#By default, set breakpoints as hard breakpoints.
gdb_breakpoint_override hard

# if {![using_hla]} {
#     # if srst is not fitted use SYSRESETREQ to
#     # perform a soft reset
#     cortex_m reset_config sysresetreq
# }

#MASTER TAP
jtag newtap $_CHIPNAME chp -irlen 7 -ircapture 0x01 -irmask 0x03

#M4F tap which we want
jtag newtap $_CHIPNAME cpu -irlen 4 -ircapture 0x01 -irmask 0x03 -disable -expected-id 0x4ba06477

#target configuration - There is only 1 tap at a time, hence only 1 target is defined.
set _TARGETNAME $_CHIPNAME.cpu
dap create $_CHIPNAME.dap -chain-position $_TARGETNAME -adiv6
target create $_TARGETNAME cortex_m -dap $_CHIPNAME.dap -ap-num 0x40000

# Setup the interesting tap
jtag configure $_CHIPNAME.chp -event setup {
	if { [info exists CHIPNAME] } {
		set _CHIPNAME $CHIPNAME
	} else {
		set _CHIPNAME QCC730
	}
	if {![using_hla]} {
     # if srst is not fitted use SYSRESETREQ to
#     # perform a soft reset
     cortex_m reset_config sysresetreq
 }
	#Make sure the name is same with above.
     jtag tapenable $_CHIPNAME.cpu;
    #  poll off;
}

#Select CORE tap by set private instruction.
#to be used when MASTER tap is selected.
jtag configure $_TARGETNAME -event tap-enable {
     irscan $_CHIPNAME.chp 0x0B;
     jtag tapdisable $_CHIPNAME.chp;
}


$_TARGETNAME configure -event reset-init {
    echo "reset-init"
	#CTRL/STAT - Control/Status Register
	#drscan 0x0 0x23000002 1

   #Enable halting debug.
   #JLINK_SYS_Report("local_reset_halt: mem_dword_wr(DHCSR)");
   mww 0xE000EDF0 0xA05F003 1

   #Enable halting debug trap on local reset.
   #JLINK_SYS_Report("local_reset_halt: mem_dword_wr(DEMCR)");
   mww 0xE000EDFC 0x010007F1 1

   #Trigger a local reset.
   #JLINK_SYS_Report("local_reset_halt: mem_dword_wr(AIRCR)");
   mww 0xE000ED0C 0x05FA0005 1
}

#select MASTER tap by modifying the register.
#to be used when CORE tap is selected.
jtag configure $_CHIPNAME.chp -event tap-enable {
                echo "master tap-enable"
                jtag tapdisable $_TARGETNAME;
}

#disables the master tap
jtag configure $_TARGETNAME -event tap-disable {
                echo "slave tap-enable"
}

jtag configure $_CHIPNAME.chp -event tap-disable {
                echo "master tap-enable"
}

proc init_targets { } {

}

proc after_gdb_detach { } {
    #reset
    resume
    shutdown
}

$_TARGETNAME configure -event gdb-detach after_gdb_detach

init
