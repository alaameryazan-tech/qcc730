
#WARNING: DO NOT touch this file for non-Qualcomm user
#Qualcomm internal configuration

#if cfg_external does not exist, will copy from sample_cfg_external
cfg_external: cfg_external.yaml
sample_cfg_external: sample_cfg_external.yaml

utils:
    logger:
        #enable saving stdout to log file
        stream2file: true
        #enable saving logging to log file
        logging2file: true
        #enalbe time stamp as prefix of log file name
        filename_timestamp: false
        #enable appending log data to log file. If not enabled, will just remove old log file
        file_append: false
        #enalbe time stamp as prefix of log data
        logging_timestamp: true
    run_cmd:
        #enalbe run_cmd() to execute command but not skip. "false" is for debug, used to print command w/o executing
        run_enable: true

qccsdk_supported_scripts: [set, get, flash, build]

qccsdk_base:
    #to check if workspace is a valid qccsdk
    check_path: include/api/assert.h
    #to check if workspace is a valid release qccsdk (also called chipcode)
    release_sdk_check_path: bin/wlan/regdb.bin
    #board dir
    boards_dir: boards
    log_dir: log
    nvm_prg_path: tools/nvm_programmer/scripts/nvm_programmer.py

#structure: [board, bdf_name]
board_map:
    fdt_name: bdwlan
    repo:
        bdf_dir: modules/wifi/bin
        boards_supported: [qcc730v1_socket, qcc730v2_socket, qcc730v2_evb11_hostless, qcc730v2_evb12_hostless, qcc730v2_evb13_hostless, mqm405x, mqm405i, mqm730x, mqm730i, cqm730x, cqm730i]
        qcc730v1_socket: bdwlan.bin
        qcc730v2_socket: bdwlan03.bin
        qcc730v2_evb11_hostless: bdwlan01.bin
        qcc730v2_evb12_hostless: bdwlan02.bin
        qcc730v2_evb13_hostless: bdwlan03.bin
        mqm405x: mqm730x.bin
        mqm405i: mqm730i.bin
        mqm730x: mqm730x.bin
        mqm730i: mqm730i.bin
        cqm730x: mqm730x.bin
        cqm730i: mqm730i.bin
    SDK:
        bdf_dir: bin/wlan
        boards_supported: [qcc730v2_evb11_hostless, qcc730v2_evb13_hostless, mqm405x, mqm405i, mqm730x, mqm730i, cqm730x, cqm730i]
        qcc730v1_socket: bdwlan.bin
        qcc730v2_socket: bdwlan03.bin
        qcc730v2_evb11_hostless: bdwlan01.bin
        qcc730v2_evb13_hostless: bdwlan03.bin
        mqm405x: mqm730x.bin
        mqm405i: mqm730i.bin
        mqm730x: mqm730x.bin
        mqm730i: mqm730i.bin
        cqm730x: mqm730x.bin
        cqm730i: mqm730i.bin

regdb_map:
    fdt_name: regdb
    repo:
        regdb_path: modules/wifi/bin
    SDK:
        regdb_path: modules/wifi/bin

fdt_map:
    nvm_entry_name: rram_fdt
    repo:
        fdt_path_app_bin: tools/storage/firmware_desc_table/curr_age_fdt/frn_curr_age_with_app_bin.bin
        fdt_path_app_elf: tools/storage/firmware_desc_table/curr_age_fdt/frn_curr_age_default.bin
    SDK:
        fdt_path_app_bin: tools/storage/firmware_desc_table/curr_age_fdt/frn_curr_age_with_app_bin.bin
        fdt_path_app_elf: tools/storage/firmware_desc_table/curr_age_fdt/frn_curr_age_default.bin

#structure: [appdir, nvm_entry_name, image_name]
appdir_map:
    repo:
        appdirs_specific_supported: [pbl, sbl, prg, ftm, intg]
        appdirs_build_supported: [pbl, sbl, prg, ftm, demo/hello_world, demo/posix_demo, intg, demo/fs_demo, demo/qcli_demo, demo/matter_demo, demo/qat_demo, demo/powertest_demo, demo/ambient_power_demo]
        appdirs_flash_supported: [ftm, demo/hello_world, demo/posix_demo, demo/fs_demo, demo/qcli_demo, demo/matter_demo, demo/qat_demo, demo/powertest_demo, demo/ambient_power_demo]
    SDK:
        appdirs_specific_supported: [sbl, prg, ftm]
        appdirs_build_supported: [sbl, prg, ftm, demo/qcli_demo, demo/hello_world, demo/posix_demo, intg, demo/fs_demo, demo/matter_demo, demo/qat_demo, demo/powertest_demo, demo/ambient_power_demo]
        appdirs_flash_supported: [ftm, demo/qcli_demo, demo/hello_world, demo/posix_demo, demo/fs_demo, demo/matter_demo, demo/qat_demo, demo/powertest_demo, demo/ambient_power_demo]
    pbl: [rram_pbl, FERMION_PBL]
    sbl: [rram_sbl, FERMION_SBL]
    prg: [Null, FERMION_NVM_PROGRAMMER]
    ftm: [rram_app, FERMION_FTM]
    demo/qcli_demo: [flash_app, FERMION_IOE_QCLI_DEMO]
    demo/hello_world: [flash_app, FERMION_HELLO_WORLD]
    demo/posix_demo: [flash_app, FERMION_POSIX_DEMO]
    demo/fs_demo: [flash_app, FERMION_FS_DEMO]
    demo/matter_demo: [flash_app, FERMION_MATTER_DEMO]
    demo/qat_demo: [flash_app, FERMION_QAT_DEMO]
    intg: [Null, [FERMION_NVM_PROGRAMMER, FERMION_SBL, FERMION_FTM, FERMION_HELLO_WORLD, FERMION_POSIX_DEMO, FERMION_FS_DEMO, FERMION_IOE_QCLI_DEMO, FERMION_MATTER_DEMO, FERMION_QAT_DEMO]]
    demo/powertest_demo: [flash_app, FERMION_POWER_TEST_DEMO]
    demo/ambient_power_demo: [flash_app, FERMION_AMBIENT_POWER_DEMO]

#structure [nvm_entry_name, offset]
nvm_offset:
    rram_pbl: 0x200000
    rram_fdt: &fdt_offset 0x208000
    rram_sbl: 0x20A400
    rram_sblB: 0x212400
    rram_app: 0x21A400
    bdwlan: 0x37A000
    end: &rram_end 0x380000
    flash_app: 0

flash:
    jtags_supported: [openocd, jlink]
    default_actions_supported: [Null, flash, erase, reset]
    openocd: ch347
    jlink: jlink
    nvm: [rram, flash, otp]
    erase_rram: [*fdt_offset, *rram_end]

build:
    default_actions_supported: [Null, clean, build, rebuild]
